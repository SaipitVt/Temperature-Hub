<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATC Monitor Master/Slave</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0c1015">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

    <style>
        body { margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; background: #0c1015; font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; }
        .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(25px); border-radius: 40px; padding: 30px; width: 340px; text-align: center; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 30px 60px rgba(0,0,0,0.6); }
        .status-tag { font-size: 0.65rem; padding: 5px 12px; border-radius: 12px; background: rgba(0,0,0,0.3); display: inline-block; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; color: #888; }

        .gauge-wrapper { position: relative; width: 300px; height: 180px; margin: 0 auto; overflow: visible; }
        .gauge-svg { width: 100%; height: 100%; overflow: visible; }
        .gauge-track { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 12; stroke-linecap: round; }
        .gauge-fill { fill: none; stroke: url(#gauge-gradient); stroke-width: 12; stroke-linecap: round; stroke-dasharray: 157; stroke-dashoffset: 157; transition: stroke-dashoffset 0.8s ease; }
        .gauge-dot { fill: #fff; filter: drop-shadow(0 0 8px rgba(255,255,255,0.8)); transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); }

        .temp-main { position: absolute; top: 72%; left: 50%; transform: translate(-50%, -50%); width: 100%; }
        .value { font-size: 4.2rem; font-weight: 600; margin: 0; line-height: 1; letter-spacing: -2px; }
        .status-text { font-size: 0.85rem; font-weight: 800; margin-top: 8px; text-transform: uppercase; letter-spacing: 2px; }

        .trend-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 15px 0; }
        
        .extreme-pill {
            width: 70px; height: 50px; border-radius: 18px; 
            background: #0c1015; display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.5), -2px -2px 8px rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.02);
        }
        .ex-label { font-size: 0.55rem; font-weight: 900; color: #666; text-transform: uppercase; margin-bottom: 2px; }
        .ex-val { font-size: 1rem; font-weight: 700; }
        #t-min { color: #4dadff; }
        #t-max { color: #ff5e5e; }

        .trend-box { font-size: 0.75rem; padding: 6px 10px; border-radius: 10px; background: rgba(0,0,0,0.2); font-weight: 600; flex: 1; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.08); }
        .info-item { display: flex; flex-direction: column; align-items: center; }
        .info-label { font-size: 0.6rem; opacity: 0.4; text-transform: uppercase; letter-spacing: 1px; }
        .info-val { font-size: 1rem; font-weight: 600; margin-top: 4px; }
        
        button { margin-top: 25px; padding: 18px; width: 100%; border-radius: 20px; border: none; font-size: 0.9rem; font-weight: 800; cursor: pointer; background: #2ecc71; color: white; transition: 0.3s; text-transform: uppercase; }
        .trend-up { color: #ff5e5e; } .trend-down { color: #4dadff; } .trend-stable { color: #888; }
    </style>
</head>
<body>

<div class="card">
    <div id="status" class="status-tag">Ожидание данных</div>
    
    <div class="gauge-wrapper">
        <svg viewBox="-15 -10 150 100" class="gauge-svg">
            <defs>
                <linearGradient id="gauge-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#4dadff" />   
                    <stop offset="55%" stop-color="#2ecc71" />  
                    <stop offset="80%" stop-color="#f1c40f" />  
                    <stop offset="100%" stop-color="#e74c3c" /> 
                </linearGradient>
            </defs>
            <path class="gauge-track" d="M 10 60 A 50 50 0 0 1 110 60" />
            <path id="gauge-fill" class="gauge-fill" d="M 10 60 A 50 50 0 0 1 110 60" />
            <circle id="gauge-dot" class="gauge-dot" r="5" cx="10" cy="60" />
        </svg>

        <div class="temp-main">
            <div id="temp" class="value">--.-</div>
            <div id="status-desc" class="status-text">ПОДКЛЮЧИТЕСЬ</div>
        </div>
    </div>

    <div class="trend-row">
        <div class="extreme-pill">
            <span class="ex-label">Min</span>
            <span id="t-min" class="ex-val">--.-</span>
        </div>
        <div id="temp-trend" class="trend-box trend-stable">Ожидание...</div>
        <div class="extreme-pill">
            <span class="ex-label">Max</span>
            <span id="t-max" class="ex-val">--.-</span>
        </div>
    </div>

    <div class="info-grid">
        <div class="info-item"><div class="info-label">Влажность</div><div id="hum" class="info-val">--.- %</div></div>
        <div class="info-item"><div class="info-label">Батарея</div><div id="battery" class="info-val">-- %</div></div>
        <div class="info-item"><div class="info-label">Телефон</div><div id="phone-battery" class="info-val">-- %</div></div>
        <div class="info-item"><div class="info-label">Обновлено</div><div id="last-update" class="info-val">--:--</div></div>
    </div>

    <button id="connect">Запустить Мастер-узел</button>
</div>

<audio id="silent-audio" loop><source src="https://raw.githubusercontent.com/anars/blank-audio/master/10-seconds-of-silence.mp3" type="audio/mp3"></audio>

<script>
    const connectBtn = document.getElementById('connect');
    const tempDisplay = document.getElementById('temp');
    const statusDesc = document.getElementById('status-desc');
    const trendDisplay = document.getElementById('temp-trend');
    const minDisplay = document.getElementById('t-min');
    const maxDisplay = document.getElementById('t-max');
    const humDisplay = document.getElementById('hum');
    const batteryDisplay = document.getElementById('battery');
    const phoneBattDisplay = document.getElementById('phone-battery');
    const timeDisplay = document.getElementById('last-update');
    const statusTag = document.getElementById('status');
    const silentAudio = document.getElementById('silent-audio');
    const gaugeFill = document.getElementById('gauge-fill');
    const gaugeDot = document.getElementById('gauge-dot');

    const TOPIC = "atc_sensor/pwa_monitor_unique_777"; 
    const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');

    let isMaster = false;
    let bluetoothDevice = null;
    let bleServer = null;
    
    let syncData = {
        t: null, h: null, b: null, pb: null, 
        min: Infinity, max: -Infinity, trend: "0.00", trendClass: "trend-stable"
    };

    let tempHistory = [];
    let wakeLock = null;

    function updateGauge(temp) {
        const minScale = 0; const maxScale = 35;
        let percent = (temp - minScale) / (maxScale - minScale);
        percent = Math.max(0, Math.min(1, percent));
        
        const fullArc = 157; 
        gaugeFill.style.strokeDashoffset = (fullArc - (percent * fullArc)).toString();
        
        const angle = Math.PI + (percent * Math.PI);
        const r = 50, cx = 60, cy = 60;
        gaugeDot.setAttribute('cx', cx + r * Math.cos(angle));
        gaugeDot.setAttribute('cy', cy + r * Math.sin(angle));

        if (temp >= 17 && temp <= 24.5) { statusDesc.innerText = "ИДЕАЛЬНО"; statusDesc.style.color = "#2ecc71"; }
        else if (temp > 24.5 && temp <= 28) { statusDesc.innerText = "НОРМАЛЬНО"; statusDesc.style.color = "#f1c40f"; }
        else if (temp > 28) { statusDesc.innerText = "ОПАСНО: ЖАРА"; statusDesc.style.color = "#e74c3c"; }
        else { statusDesc.innerText = "ХОЛОДНО"; statusDesc.style.color = "#4dadff"; }
    }

    function calculateMasterStats(newTemp) {
        const val = parseFloat(newTemp);
        const now = Date.now();

        if (val < syncData.min) syncData.min = val;
        if (val > syncData.max) syncData.max = val;

        tempHistory.push({ val: val, time: now });
        tempHistory = tempHistory.filter(item => item.time > now - 10 * 60 * 1000);
        
        if (tempHistory.length > 2) {
            const diff = (tempHistory[tempHistory.length-1].val - tempHistory[0].val);
            syncData.trend = (diff > 0 ? '+' : '') + diff.toFixed(2);
            syncData.trendClass = diff > 0.05 ? "trend-up" : (diff < -0.05 ? "trend-down" : "trend-stable");
        }
    }

    function updateUI(data, fromCloud = false) {
        if (data.t) {
            tempDisplay.innerText = data.t;
            updateGauge(parseFloat(data.t));
        }
        if (data.h) humDisplay.innerText = data.h + " %";
        if (data.b) batteryDisplay.innerText = data.b + " %";
        if (data.pb) phoneBattDisplay.innerText = data.pb + " %";
        
        if (data.min !== undefined && data.min !== Infinity) minDisplay.innerText = data.min.toFixed(1);
        if (data.max !== undefined && data.max !== -Infinity) maxDisplay.innerText = data.max.toFixed(1);
        if (data.trend !== undefined) {
            trendDisplay.innerText = data.trend + " °C (10м)";
            trendDisplay.className = "trend-box " + (data.trendClass || "trend-stable");
        }

        timeDisplay.innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        if (fromCloud && !isMaster) {
            statusTag.innerText = "Облако: Онлайн";
            statusTag.style.color = "#3498db";
        } else if (isMaster) {
            statusTag.innerText = "Bluetooth: LIVE (Мастер)";
            statusTag.style.color = "#2ecc71";
            broadcast();
        }
    }

    async function updatePhoneBattery() {
        if ('getBattery' in navigator) {
            const battery = await navigator.getBattery();
            syncData.pb = Math.round(battery.level * 100);
            if (isMaster) broadcast();
        }
    }

    async function startBLE() {
        try {
            bluetoothDevice = await navigator.bluetooth.requestDevice({ 
                filters: [{ namePrefix: 'ATC' }, { namePrefix: 'LYWSD03' }], 
                optionalServices: [0x181a, 0x180f] 
            });
            
            bluetoothDevice.addEventListener('gattserverdisconnected', onDisconnected);
            connectToServer();
        } catch (err) { console.error(err); }
    }

    async function connectToServer() {
        try {
            bleServer = await bluetoothDevice.gatt.connect();
            const service = await bleServer.getPrimaryService(0x181a);
            
            const tChar = await service.getCharacteristic(0x2a6e);
            await tChar.startNotifications();
            tChar.oncharacteristicvaluechanged = (e) => {
                syncData.t = (e.target.value.getInt16(0, true) / 100).toFixed(1);
                calculateMasterStats(syncData.t);
                updateUI(syncData);
            };

            try {
                const hChar = await service.getCharacteristic(0x2a6f);
                await hChar.startNotifications();
                hChar.oncharacteristicvaluechanged = (e) => {
                    syncData.h = (e.target.value.getUint16(0, true) / 100).toFixed(1);
                    updateUI(syncData);
                };
            } catch(e){}

            updateSensorBattery();
            
            connectBtn.innerText = "МАСТЕР: АКТИВЕН";
            connectBtn.style.background = "#27ae60";
            isMaster = true;
            
        } catch (err) {
            setTimeout(connectToServer, 5000);
        }
    }

    async function updateSensorBattery() {
        if (!bleServer || !bleServer.connected) return;
        try {
            const bSrv = await bleServer.getPrimaryService(0x180f);
            const bChar = await bSrv.getCharacteristic(0x2a19);
            const bVal = await bChar.readValue();
            syncData.b = bVal.getUint8(0);
            updateUI(syncData);
        } catch(e){}
        setTimeout(updateSensorBattery, 5 * 60 * 1000);
    }

    function onDisconnected() {
        statusTag.innerText = "Переподключение...";
        setTimeout(connectToServer, 3000);
    }

    function broadcast() {
        if (client.connected) {
            client.publish(TOPIC, JSON.stringify(syncData));
        }
    }

    client.on('connect', () => {
        client.subscribe(TOPIC);
        statusTag.innerText = "MQTT: ОК";
    });

    client.on('message', (topic, msg) => {
        if (!isMaster) {
            try {
                const data = JSON.parse(msg.toString());
                updateUI(data, true);
            } catch(e){}
        }
    });

    connectBtn.onclick = async () => {
        if (isMaster) return;
        try {
            if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
            silentAudio.play().catch(()=>{});
            await updatePhoneBattery();
            setInterval(updatePhoneBattery, 5 * 60 * 1000);
            await startBLE();
        } catch (err) { alert(err.message); }
    };

    // Регистрация Service Worker для PWA
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('PWA: Ready'))
                .catch(err => console.log('PWA: Error', err));
        });
    }
</script>
</body>
</html>
